name: Go server tests

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/go-server-tests.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/go-server-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
      - run: go test ./...
